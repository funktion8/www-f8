<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>www | Website-Registry</title>
    <meta name="description" content="Zentrales Website-Repository fuer Funktion8 und weitere getrennt gepflegte Websites.">
    <style>
      :root {
        --ink: #1f2b24;
        --muted: #56645d;
        --paper: #f5f7f4;
        --surface: #ffffff;
        --line: #d9e0dc;
        --green: #006b5a;
        --gold: #f2c14e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background: var(--paper);
        color: var(--ink);
        font-family: Arial, Helvetica, sans-serif;
        line-height: 1.55;
        margin: 0;
      }

      main {
        margin: 0 auto;
        max-width: 1040px;
        padding: clamp(2rem, 8vw, 6rem) clamp(1rem, 4vw, 3rem);
      }

      .kicker {
        color: #b4511d;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0;
        margin: 0 0 0.75rem;
        text-transform: uppercase;
      }

      h1 {
        font-size: clamp(2.3rem, 6vw, 4.8rem);
        line-height: 1;
        margin: 0 0 1rem;
      }

      .lead {
        color: var(--muted);
        font-size: 1.2rem;
        max-width: 760px;
      }

      .site-list {
        display: grid;
        gap: 1rem;
        margin-top: 3rem;
      }

      .site-card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-left: 6px solid var(--gold);
        border-radius: 8px;
        display: grid;
        gap: 1rem;
        grid-template-columns: minmax(0, 1fr) auto;
        padding: 1.25rem;
      }

      .site-card h2 {
        font-size: 1.35rem;
        margin: 0 0 0.4rem;
      }

      .site-card p {
        color: var(--muted);
        margin: 0;
      }

      .actions {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
      }

      a {
        color: var(--green);
        font-weight: 700;
      }

      .button {
        align-items: center;
        background: var(--green);
        border-radius: 8px;
        color: var(--surface);
        display: inline-flex;
        min-height: 42px;
        padding: 0.65rem 0.9rem;
        text-decoration: none;
      }

      code {
        background: #e8eee9;
        border-radius: 6px;
        padding: 0.1rem 0.25rem;
      }

      @media (max-width: 680px) {
        .site-card {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="kicker">ofunk/www</p>
      <h1>Website-Registry</h1>
      <p class="lead">Dieses Repository verwaltet mehrere getrennte Websites. Jede Site hat einen eigenen Ordner, eigene Assets, eigene Rechtsseiten und eigene Deployment-Metadaten.</p>

      <section class="site-list" aria-label="Sites">
        <article class="site-card">
          <div>
            <h2>Funktion8</h2>
            <p>Notariat as Code Website fuer <code>funktion8.de</code>.</p>
          </div>
          <div class="actions">
            <a class="button" href="funktion8/">Site oeffnen</a>
            <a href="funktion8/site.json">Metadaten</a>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
